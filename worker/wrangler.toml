name = "puzzle-worker"
main = "src/index.ts"
compatibility_date = "2024-12-05"
workers_dev = true

routes = [
  { pattern = "puzzle.dengjiabei.cn/api/*", zone_name = "dengjiabei.cn" }
]

[durable_objects]
bindings = [
  { name = "PUZZLE_ROOM", class_name = "PuzzleRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PuzzleRoom"]
